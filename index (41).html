<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d1a;--surface:#0f172a;--surface2:#080e1a;--border:#1e293b;--border2:#334155;
  --gold:#C9A84C;--gold2:#a07a30;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;
  --green:#10b981;--red:#ef4444;--purple:#818cf8;--yellow:#C9A84C;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
button{cursor:pointer}

/* LAYOUT */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:width .3s;flex-shrink:0;z-index:200}
#sidebar.collapsed{width:64px}
#main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
#header{background:var(--surface2);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#content{flex:1;padding:32px;overflow-y:auto;max-height:calc(100vh - 57px)}

/* SIDEBAR */
.logo-area{padding:22px 18px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10}
.logo-icon{background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:8px;padding:7px 9px;flex-shrink:0;font-size:18px}
.logo-text{font-family:'Playfair Display',serif;font-size:16px;font-weight:800;line-height:1}
.logo-sub{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
nav{flex:1;padding:10px 8px}
.nav-btn{width:100%;display:flex;align-items:center;gap:10;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:500;transition:all .2s;margin-bottom:2px;white-space:nowrap;overflow:hidden}
.nav-btn:hover{background:rgba(201,168,76,.08);color:var(--muted)}
.nav-btn.active{background:rgba(201,168,76,.12);color:var(--gold);font-weight:700}
.nav-btn svg{flex-shrink:0}
.nav-dot{margin-left:auto;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.collapse-btn{padding:10px 8px;border-top:1px solid var(--border)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}

/* STAT CARD */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.stat-glow{position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 12px 0 100%}
.stat-label{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:28px;font-weight:800;font-family:'Playfair Display',serif;color:var(--text);margin:8px 0 4px}
.stat-sub{font-size:12px;color:var(--muted)}
.stat-icon{border-radius:10px;padding:10px;display:flex}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
th{padding:12px 16px;text-align:left;color:var(--dim);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:nth-child(even){background:var(--surface2)}
tbody tr:hover{background:rgba(201,168,76,.04)}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;margin-bottom:5px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.field label .req{color:var(--gold);margin-left:2px}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--dim)}
textarea.inp{resize:vertical;min-height:70px}
.err-msg{font-size:11px;color:var(--red);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;border:none;transition:all .2s;letter-spacing:.02em;white-space:nowrap}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0f172a}
.btn-secondary{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-whatsapp{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:11px}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}
.badge-green{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.badge-yellow{background:rgba(201,168,76,.15);color:#C9A84C;border:1px solid rgba(201,168,76,.3)}
.badge-gray{background:rgba(100,116,139,.15);color:#64748b;border:1px solid rgba(100,116,139,.3)}
.badge-purple{background:rgba(129,140,248,.15);color:#818cf8;border:1px solid rgba(129,140,248,.3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6);animation:slideUp .25s}
.modal-sm{max-width:480px}
.modal-md{max-width:600px}
.modal-lg{max-width:860px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.modal-header h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;margin:0}
.modal-body{padding:24px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border-radius:10px;padding:13px 20px;font-size:14px;z-index:9999;display:flex;align-items:center;gap:10;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .3s;max-width:360px}

/* CHART */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:56px}
.bar-chart .bar{flex:1;border-radius:3px 3px 0 0;transition:height .6s}
.bar-chart .bar-label{font-size:9px;color:var(--dim);text-align:center;margin-top:3px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center}

/* EMPTY STATE */
.empty{padding:48px;text-align:center;color:var(--dim)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px}

/* SECTION DIVIDER */
.section-div{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);padding-bottom:8px;margin:16px 0 12px}

/* WHATSAPP PREVIEW */
.wa-preview{background:#0d1e13;border:1px solid #1a3a22;border-radius:10px;padding:14px;font-size:13px;color:#d4e8d5;white-space:pre-wrap;line-height:1.6;font-family:monospace;max-height:280px;overflow-y:auto}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:var(--text);margin-bottom:3px}
.page-sub{font-size:13px;color:var(--dim)}

/* SEARCH BAR */
.search-bar{position:relative;flex:1}
.search-bar input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}

/* PROFILE */
.profile-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#0f172a}

/* CREDIÁRIO ACCORDION */
.cred-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.cred-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background .15s}
.cred-header:hover{background:rgba(201,168,76,.04)}
.cred-body{border-top:1px solid var(--border);padding:0}

/* RECEITA CARD */
.receita-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color .2s}
.receita-card.ativa{border-color:rgba(201,168,76,.4)}

/* INFO GRID */
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--dim)}
.info-value{color:var(--text)}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:64px}
  #sidebar .logo-text,.nav-btn span,.logo-sub,.collapse-btn span{display:none}
  #content{padding:12px}
  .grid2,.grid3,.grid5{grid-template-columns:1fr}
  .page-header{flex-direction:column}
  .modal{max-height:95vh}
  .modal-body{padding:16px}
  table{font-size:12px}
  th,td{padding:8px 10px}
  .stat-value{font-size:22px}
  .btn{padding:8px 14px;font-size:12px}
  .page-title{font-size:22px}
}
@media(max-width:480px){
  #content{padding:8px}
  .grid2{grid-template-columns:1fr}
  .modal-body{padding:12px}
  .btn-sm{padding:6px 10px;font-size:11px}
  #header{padding:10px 16px}
  .stat-value{font-size:20px}
}
/* Touch improvements */
button,a,.nav-btn,.lente-row{-webkit-tap-highlight-color:transparent}
input,select,textarea{font-size:16px!important}
::-webkit-scrollbar{width:3px;height:3px}

/* Bottom navigation */
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;border:none;color:var(--dim);cursor:pointer;padding:6px 0;font-family:'DM Sans',sans-serif;transition:color .2s;min-height:52px}
.bnav-btn.active{color:var(--gold)}
.bnav-btn:active{opacity:.7}

/* When bottom nav visible, add padding to content */
@media(max-width:600px){
  #bottom-nav{display:block!important}
  #sidebar{display:none!important}
  #main{width:100%}
  #content{padding-bottom:72px}
  #header{padding:10px 16px}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo-area">
      <div class="logo-icon">👓</div>
      <div>
        <div class="logo-text">lclass</div>
        <div class="logo-sub">Ótica</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="collapse-btn">
      <button class="nav-btn" onclick="abrirConfiguracoes()" style="color:#C9A84C">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

          📲 Instalar App
        </button>

<!-- MODAL CONTAINER -->
<div id="modal-root"></div>
<!-- TOAST CONTAINER -->
<div id="toast-root"></div>

<script>
// ═══════════════════════════════════════════════════════════
// PWA - Service Worker & Install Prompt
// ═══════════════════════════════════════════════════════════
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button in header
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = 'none';
  showToast('App instalado com sucesso!', 'success');
});

async function instalarApp() {
  if(!deferredPrompt) {
    showToast('Para instalar: use o menu do navegador → "Adicionar à tela inicial"', 'info');
    return;
  }
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
}

// Register inline service worker for offline support
if('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'otica-lclass-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      // Cache-first for same-origin, network for external
      if(e.request.url.startsWith(self.location.origin)) {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request))
        );
      }
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════
const DB = {
  get(k){try{return JSON.parse(localStorage.getItem('otica_'+k)||'null')}catch{return null}},
  set(k,v){localStorage.setItem('otica_'+k,JSON.stringify(v))},

function abrirWhatsApp(){
  const input = document.getElementById(_waTelId);
  const tel = input ? input.value.trim() : '';
  if(!tel){showToast('Informe o número do WhatsApp','error');return;}
  const num = tel.replace(/\D/g,'');
  const url = 'https://wa.me/55'+num+'?text='+encodeURIComponent(_waMsgAtual);
  // Tenta abrir de várias formas para garantir compatibilidade
  try {
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(e) {
    window.location.href = url;
  }
  closeModal();
}

function showModal(html, cls='modal-md'){
  const root = document.getElementById('modal-root');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const box = document.createElement('div');
  box.className = 'modal '+cls;
  box.innerHTML = html;
  overlay.appendChild(box);
  overlay.addEventListener('click', function(e){ if(e.target===this) closeModal(); });
  root.innerHTML = '';
  root.appendChild(overlay);
}
function closeModal(){
  fecharCamera(); // Garante que a câmera é fechada ao fechar o modal
  document.getElementById('modal-root').innerHTML='';
}
let toastTimer;
function showToast(msg,type='success'){
  const colors={success:'#10b981',error:'#ef4444',info:'#C9A84C'};
  const icon={success:'✓',error:'✕',info:'ℹ'};
  document.getElementById('toast-root').innerHTML=`<div class="toast" style="border:1px solid ${colors[type]};border-left:4px solid ${colors[type]}"><span style="color:${colors[type]};font-weight:700">${icon[type]}</span><span>${esc(msg)}</span></div>`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{document.getElementById('toast-root').innerHTML=''},3500);
}

// CONFIRM DIALOG
// ═══════════════════════════════════════════════════════════
function confirmDialog(msg, onYes){
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const box = document.createElement('div');
  box.className = 'modal modal-sm';
  
  const header = document.createElement('div');
  header.className = 'modal-header';
  header.innerHTML = '<h2>Confirmar</h2>';
  const xBtn = document.createElement('button');
  xBtn.className = 'btn btn-ghost btn-sm';
  xBtn.textContent = '✕';
  xBtn.addEventListener('click', closeModal);
  header.appendChild(xBtn);
  
  const body = document.createElement('div');
  body.className = 'modal-body';
  const p = document.createElement('p');
  p.style.cssText = 'color:var(--muted);margin-bottom:20px';
  p.textContent = msg;
  
  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost';
  cancelBtn.textContent = 'Cancelar';
  cancelBtn.addEventListener('click', closeModal);
  const yesBtn = document.createElement('button');
  yesBtn.className = 'btn btn-danger';
  yesBtn.textContent = 'Confirmar';
  yesBtn.addEventListener('click', ()=>{ closeModal(); onYes(); });
  
  footer.appendChild(cancelBtn);
  footer.appendChild(yesBtn);
  body.appendChild(p);
  body.appendChild(footer);
  box.appendChild(header);
  box.appendChild(body);
  overlay.appendChild(box);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  root.appendChild(overlay);
}

// MINI CHARTS
// ═══════════════════════════════════════════════════════════
function barChart(data,color='#C9A84C'){
  const max=Math.max(...data.map(d=>d.v),1);
  return `<div style="display:flex;align-items:flex-end;gap:4px;height:60px">
    ${data.map(d=>`<div class="bar-col">
      <div class="bar" style="width:100%;background:${color};height:${Math.max(4,(d.v/max)*52)}px;opacity:${d===data[data.length-1]?1:0.5};border-radius:3px 3px 0 0"></div>
      <div style="font-size:9px;color:var(--dim);margin-top:3px">${d.l}</div>
    </div>`).join('')}
  </div>`;
}
function pieChart(data){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  let cum=-90;
  const slices=data.map(d=>{
    const a=(d.v/total)*360;const s=cum;cum+=a;return{...d,s,a};
  });
  function arc(s,a){
    const r=32,cx=40,cy=40;
    const p2c=(ang)=>({x:cx+r*Math.cos(ang*Math.PI/180),y:cy+r*Math.sin(ang*Math.PI/180)});
    const start=p2c(s+a),end=p2c(s);
    const large=a>180?1:0;
    return `M${cx},${cy} L${start.x},${start.y} A${r},${r},0,${large},0,${end.x},${end.y}Z`;
  }
  return `<div style="display:flex;align-items:center;gap:16px">
    <svg width="80" height="80" viewBox="0 0 80 80">
      ${slices.map(s=>`<path d="${arc(s.s,s.a)}" fill="${s.color}" opacity="0.9"/>`).join('')}
      <circle cx="40" cy="40" r="20" fill="var(--surface)"/>
    </svg>
    <div style="display:flex;flex-direction:column;gap:4px">
      ${data.map(d=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px">
        <div style="width:10px;height:10px;border-radius:2px;background:${d.color};flex-shrink:0"></div>
        <span style="color:var(--muted)">${d.l}</span>
        <span style="color:var(--text);font-weight:700;margin-left:auto">${Math.round((d.v/total)*100)}%</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function salvarCliente(id){
  const g=x=>document.getElementById(x)?.value?.trim()||'';
  const nome=g('cf_nome'),rua=g('cf_rua'),num=g('cf_num'),bairro=g('cf_bairro'),cidade=g('cf_cidade'),cep=g('cf_cep'),ref=g('cf_ref'),mae=g('cf_mae');
  const tel=g('cf_tel'),cel=g('cf_cel');
  if(!nome)return showToast('Nome é obrigatório','error');
  if(!tel&&!cel)return showToast('Informe pelo menos um contato','error');
  if(!rua||!num||!bairro||!cidade||!cep||!ref||!mae)return showToast('Preencha todos os campos obrigatórios','error');
  const data={nome,telefone:tel,celular:cel,rua,numero:num,complemento:g('cf_comp'),bairro,cidade,estado:g('cf_estado'),cep,referencia:ref,mae,pai:g('cf_pai'),status:g('cf_status')};
  if(id){
    state.clientes=state.clientes.map(c=>c.id===id?{...c,...data}:c);
    showToast('Cliente atualizado!','success');
  } else {
    state.clientes.push({...data,id:uid(),cadastro:today()});
    showToast('Cliente cadastrado!','success');
  }
  saveAll();closeModal();renderClientes();
}
function deletarCliente(id){
  confirmDialog('Tem certeza que deseja excluir este cliente?',()=>{
    state.clientes=state.clientes.filter(c=>c.id!==id);
    saveAll();showToast('Cliente removido.','info');renderClientes();
  });
}
function verPerfilCliente(id){

  const recAtiva=recs.find(r=>r.ativa);
  showModal(`
    <div class="modal-header"><h2>Perfil — ${esc(c.nome)}</h2><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body">

          ${recAtiva?`<div style="background:var(--surface2);border-radius:8px;padding:12px;font-size:12px;color:var(--muted)">
            <div style="color:var(--text);font-weight:600;margin-bottom:4px">Dr(a). ${esc(recAtiva.profissional)}</div>

          </div>`:'<p style="color:var(--dim);font-size:13px">Nenhuma receita ativa</p>'}

let _cameraStream = null;

function toggleGrade(){
  const checked = document.getElementById('rf_usar_grade')?.checked;
  const overlay = document.getElementById('rf_grade_overlay');
  if(!overlay) return;
  if(checked){
    overlay.style.display = 'block';
    iniciarCamera();
  } else {
    overlay.style.display = 'none';
    fecharCamera();
  }
}

async function iniciarCamera(){
  const video = document.getElementById('rf_camera_live');
  const canvas = document.getElementById('rf_grade_canvas');
  if(!video || !canvas) return;
  try {
    _cameraStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: { exact: 'environment' } }
    });
    video.srcObject = _cameraStream;
    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      desenharGradeCanvas(canvas);
    };
  } catch(err){
    // Camera denied - show fullscreen guide overlay instead
    mostrarGradeGuia();
  }
}

function mostrarGradeGuia(){
  const existing = document.getElementById('grade_guia_fullscreen');
  if(existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'grade_guia_fullscreen';
  overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column';

  // Container do video + canvas sobrepostos
  const videoWrap = document.createElement('div');
  videoWrap.style.cssText = 'position:relative;flex:1;overflow:hidden;background:#000';

  // Video ao vivo (câmera frontal como espelho)
  const video = document.createElement('video');
  video.id = 'grade_video_live';
  video.autoplay = true;
  video.playsInline = true;
  video.muted = true;
  video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)'; // espelho
  videoWrap.appendChild(video);

  // Canvas da grade transparente sobre o video
  const canvas = document.createElement('canvas');
  canvas.id = 'grade_canvas_live';
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none';
  videoWrap.appendChild(canvas);

  // Instrução no topo
  const topBar = document.createElement('div');
  topBar.style.cssText = 'position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,0.6);padding:10px;text-align:center;z-index:2';
  topBar.innerHTML = '<p style="margin:0;color:#10b981;font-size:13px;font-weight:700">👁 Alinhe os olhos nos círculos verdes</p><p style="margin:2px 0 0;color:#94a3b8;font-size:11px">Cliente de frente, olhando para a câmera</p>';
  videoWrap.appendChild(topBar);

  overlay.appendChild(videoWrap);

  // Barra inferior com botão
  const bottomBar = document.createElement('div');
  bottomBar.style.cssText = 'background:#0f172a;border-top:1px solid #1e293b;padding:14px 16px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap';

  const captureBtn = document.createElement('button');
  captureBtn.className = 'btn btn-primary';
  captureBtn.style.cssText = 'font-size:14px;padding:12px 28px';
  captureBtn.innerHTML = '📸 Capturar esta posição';
  captureBtn.addEventListener('click', () => {
    // Capturar frame do video sem a grade
    const v = document.getElementById('grade_video_live');
    if(v && v.srcObject){
      const tmp = document.createElement('canvas');
      tmp.width = v.videoWidth || 1280;
      tmp.height = v.videoHeight || 720;
      const ctx = tmp.getContext('2d');
      ctx.save();
      ctx.scale(-1,1); // desfaz o espelho para foto normal
      ctx.drawImage(v,-tmp.width,0,tmp.width,tmp.height);
      ctx.restore();
      const b64 = tmp.toDataURL('image/jpeg',0.92);
      document.getElementById('rf_foto_hidden').value = b64;
      // Mostra preview
      const prev = document.getElementById('rf_foto_preview');
      if(prev){
        prev.innerHTML='';
        const wrap=document.createElement('div');
        wrap.style.cssText='position:relative;width:100%';
        const img=document.createElement('img');
        img.src=b64;
        img.style.cssText='width:100%;max-height:260px;object-fit:cover;border-radius:10px;border:2px solid #C9A84C';
        const rm=document.createElement('button');
        rm.textContent='✕';
        rm.style.cssText='position:absolute;top:8px;right:8px;background:rgba(239,68,68,.9);border:none;border-radius:50%;width:28px;height:28px;color:white;cursor:pointer;font-size:15px;font-weight:700';
        rm.addEventListener('click',()=>{document.getElementById('rf_foto_hidden').value='';prev.innerHTML='';const b=document.getElementById('btn_analisar_ia');if(b)b.style.display='none';});
        wrap.appendChild(img);wrap.appendChild(rm);prev.appendChild(wrap);
      }
      const btn=document.getElementById('btn_analisar_ia');
      if(btn) btn.style.display='inline-flex';
      showToast('Foto capturada! Clique em Analisar com IA.','success');
    }
    fecharGradeGuia();
  });

  const switchBtn = document.createElement('button');
  switchBtn.className = 'btn btn-ghost';
  switchBtn.style.cssText = 'font-size:13px;padding:10px 16px';
  switchBtn.innerHTML = '🔄 Trocar Câmera';
  switchBtn.addEventListener('click', () => {
    // Toggle between front and rear
    const currentStream = overlay._stream;
    if(currentStream){
      const track = currentStream.getVideoTracks()[0];
      const settings = track.getSettings();
      const isFront = settings.facingMode === 'user';
      currentStream.getTracks().forEach(t => t.stop());
      const newMode = isFront ? {exact:'environment'} : 'user';
      navigator.mediaDevices.getUserMedia({ video: { facingMode: newMode } })
        .then(stream => {
          video.srcObject = stream;
          video.style.transform = isFront ? '' : 'scaleX(-1)';
          overlay._stream = stream;
        })
        .catch(() => showToast('Não foi possível trocar de câmera','error'));
    }
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost';
  cancelBtn.style.cssText = 'font-size:13px;padding:10px 16px';
  cancelBtn.innerHTML = '✕ Cancelar';
  cancelBtn.addEventListener('click', () => {
    fecharGradeGuia();
    document.getElementById('rf_foto_file')?.click();
  });

  bottomBar.appendChild(captureBtn);
  bottomBar.appendChild(switchBtn);
  bottomBar.appendChild(cancelBtn);
  overlay.appendChild(bottomBar);
  document.body.appendChild(overlay);

  // Câmera traseira - atendente aponta para o cliente
  const startStream = (constraints) => {
    return navigator.mediaDevices.getUserMedia(constraints).then(stream => {
      video.srcObject = stream;
      video.style.transform = '';
      overlay._stream = stream;
      return new Promise(resolve => {
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          desenharGradeCanvas(canvas);
          resolve();
        };
      });
    });
  };

  // Força câmera TRASEIRA
  startStream({ video: { facingMode: { exact: 'environment' }, width:{ideal:1280}, height:{ideal:720} } })
    .catch(() => startStream({ video: { facingMode: 'environment' } }))
    .catch(() => startStream({ video: true }))
    .catch(() => {
      fecharGradeGuia();
      showToast('Câmera não disponível. Use o botão Tirar Foto.','error');
      document.getElementById('rf_foto_file')?.click();
    });
}

function fecharGradeGuia(){
  const overlay = document.getElementById('grade_guia_fullscreen');
  if(overlay){
    if(overlay._stream) overlay._stream.getTracks().forEach(t=>t.stop());
    overlay.remove();
  }
  document.getElementById('rf_usar_grade').checked = false;
  document.getElementById('rf_grade_overlay').style.display = 'none';
}

function desenharGradeCanvas(canvas){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  const eyeY = h * 0.40;
  const eyeR = Math.min(w,h) * 0.07; // Círculos menores
  const eyeL = w * 0.38;  // OE mais próximo do centro
  const eyeR2 = w * 0.62; // OD mais próximo do centro

  // Grade central suave
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,eyeY); ctx.lineTo(w,eyeY); ctx.stroke();

  function circulo(x, y, r, label){
    // Círculo pulsante visual
    ctx.strokeStyle = '#10b981';
    ctx.lineWidth = Math.max(2, w*0.004);
    ctx.setLineDash([Math.max(6,w*0.015), Math.max(4,w*0.01)]);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // Ponto central
    ctx.fillStyle = '#10b981';
    ctx.beginPath(); ctx.arc(x,y,Math.max(5,w*0.008),0,Math.PI*2); ctx.fill();
    // Mira
    ctx.strokeStyle = 'rgba(16,185,129,0.55)';
    ctx.lineWidth = Math.max(1.5,w*0.003);
    ctx.beginPath(); ctx.moveTo(x-r*1.4,y); ctx.lineTo(x+r*1.4,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-r*1.4); ctx.lineTo(x,y+r*1.4); ctx.stroke();
    // Label
    ctx.fillStyle = '#10b981';
    ctx.font = 'bold '+Math.round(Math.max(14,w*0.032))+'px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
    ctx.fillText(label, x, y+r+Math.max(18,w*0.04));
    ctx.shadowBlur = 0;
  }

  circulo(eyeL, eyeY, eyeR, 'OE');
  circulo(eyeR2, eyeY, eyeR, 'OD');

  // Linha DP
  ctx.strokeStyle = '#818cf8';
  ctx.lineWidth = Math.max(2,w*0.003);
  ctx.setLineDash([Math.max(8,w*0.018),Math.max(5,w*0.01)]);
  ctx.beginPath(); ctx.moveTo(eyeL,eyeY); ctx.lineTo(eyeR2,eyeY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#818cf8';
  ctx.font = 'bold '+Math.round(Math.max(13,w*0.028))+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText('← DP →', w/2, eyeY - eyeR*0.5);
  ctx.shadowBlur=0;

  // Linha CO
  const coX = eyeL - eyeR*1.8;
  ctx.strokeStyle = '#C9A84C';
  ctx.lineWidth = Math.max(2,w*0.003);
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(coX,eyeY); ctx.lineTo(coX,h*0.80); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#C9A84C';
  const asz = Math.max(6,w*0.01);
  ctx.beginPath(); ctx.moveTo(coX-asz,h*0.78); ctx.lineTo(coX,h*0.83); ctx.lineTo(coX+asz,h*0.78); ctx.fill();
  ctx.font = 'bold '+Math.round(Math.max(12,w*0.026))+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText('CO', coX, eyeY+(h*0.80-eyeY)/2+5);
  ctx.shadowBlur=0;
}

function fecharCamera(){
  if(_cameraStream){
    _cameraStream.getTracks().forEach(t => t.stop());
    _cameraStream = null;
  }
  const video = document.getElementById('rf_camera_live');
  if(video) video.srcObject = null;

function desenharGradeCanvas(canvas){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  // Posições dos olhos (proporção do rosto típico)
  const eyeY = h * 0.42;
  const eyeR = w * 0.09;
  const eyeOE = w * 0.35; // olho esquerdo (direita da tela = OE do cliente)
  const eyeOD = w * 0.65; // olho direito (esquerda da tela = OD do cliente)
  const dash = [8, 5];

  // Grade de fundo
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,eyeY); ctx.lineTo(w,eyeY); ctx.stroke();

  // Círculo OE
  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 3;
  ctx.setLineDash(dash);
  ctx.beginPath(); ctx.arc(eyeOE, eyeY, eyeR, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#10b981';
  ctx.beginPath(); ctx.arc(eyeOE, eyeY, 6, 0, Math.PI*2); ctx.fill();
  // Mira OE
  ctx.strokeStyle = 'rgba(16,185,129,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(eyeOE-eyeR*1.3,eyeY); ctx.lineTo(eyeOE+eyeR*1.3,eyeY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(eyeOE,eyeY-eyeR*1.3); ctx.lineTo(eyeOE,eyeY+eyeR*1.3); ctx.stroke();
  // Label OE
  ctx.fillStyle = '#10b981';
  ctx.font = 'bold '+Math.round(w*0.035)+'px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('OE', eyeOE, eyeY + eyeR + w*0.045);

  // Círculo OD
  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 3;
  ctx.setLineDash(dash);
  ctx.beginPath(); ctx.arc(eyeOD, eyeY, eyeR, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#10b981';
  ctx.beginPath(); ctx.arc(eyeOD, eyeY, 6, 0, Math.PI*2); ctx.fill();
  // Mira OD
  ctx.strokeStyle = 'rgba(16,185,129,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(eyeOD-eyeR*1.3,eyeY); ctx.lineTo(eyeOD+eyeR*1.3,eyeY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(eyeOD,eyeY-eyeR*1.3); ctx.lineTo(eyeOD,eyeY+eyeR*1.3); ctx.stroke();
  // Label OD
  ctx.fillStyle = '#10b981';
  ctx.font = 'bold '+Math.round(w*0.035)+'px DM Sans, sans-serif';
  ctx.fillText('OD', eyeOD, eyeY + eyeR + w*0.045);

  // Linha DP entre pupilas
  ctx.strokeStyle = '#818cf8';
  ctx.lineWidth = 2;
  ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(eyeOE,eyeY); ctx.lineTo(eyeOD,eyeY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#818cf8';
  ctx.font = 'bold '+Math.round(w*0.03)+'px DM Sans, sans-serif';
  ctx.fillText('← DP →', w/2, eyeY - eyeR*0.4);

  // Linha CO/Altura (vertical da pupila até base)
  const coX = eyeOE - eyeR*1.8;
  ctx.strokeStyle = '#C9A84C';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(coX, eyeY); ctx.lineTo(coX, h*0.82); ctx.stroke();
  ctx.setLineDash([]);
  // Seta
  ctx.fillStyle = '#C9A84C';
  ctx.beginPath(); ctx.moveTo(coX-6, h*0.80); ctx.lineTo(coX, h*0.85); ctx.lineTo(coX+6, h*0.80); ctx.fill();
  ctx.font = 'bold '+Math.round(w*0.028)+'px DM Sans, sans-serif';
  ctx.fillText('CO/Alt', coX, eyeY + (h*0.82-eyeY)/2 + 5);

  // Instrução no topo
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, w, h*0.12);
  ctx.fillStyle = '#10b981';
  ctx.font = 'bold '+Math.round(w*0.032)+'px DM Sans, sans-serif';
  ctx.fillText('Alinhe os olhos nos círculos verdes', w/2, h*0.08);
}

  const oeEsf = g('rf_oeEsfera'), oeCil = g('rf_oeCilindro'), oeAdd = g('rf_oeAdicao');
  const div = document.getElementById('rf_sugestoes');
  if(!div) return;

  // Use the higher absolute value between eyes
  const maxEsf = Math.max(Math.abs(odEsf), Math.abs(oeEsf));
  const maxCil = Math.max(Math.abs(odCil), Math.abs(oeCil));
  const maxAdd = Math.max(Math.abs(odAdd), Math.abs(oeAdd));
  const temAdd = maxAdd > 0;
  const temCil = maxCil > 0;

  if(maxEsf === 0 && maxCil === 0) {
    div.innerHTML = '<div style="padding:10px;text-align:center;color:var(--dim);font-size:12px;background:var(--surface2);border-radius:8px">Preencha os graus acima para ver sugestões</div>';

  let tipoAuto = 'Visão Simples';
  if(temAdd) tipoAuto = 'Progressiva';

  // Filter compatible lenses using selected tipo
  const sugestoes = TABELA_LAB.filter(item => {
    if(item.tipo === 'Servico' || item.tipo === 'Tratamento AR') return false;

      // Filtro exato pelo tipo selecionado

  html += '<th style="padding:7px 10px;text-align:right;color:#818cf8;font-size:10px;text-transform:uppercase">AR Blue</th>';
  html += '</tr></thead><tbody>';

    sugestoes.forEach((item, i) => {

function desenharMedidas(imgEl, r) {
  // Replace the img with a canvas that has measurements drawn on it
  const wrapper = imgEl.parentElement;
  const w = imgEl.naturalWidth  || imgEl.width  || 800;
  const h = imgEl.naturalHeight || imgEl.height || 500;

  const canvas = document.createElement('canvas');
  canvas.width  = w;
  canvas.height = h;
  canvas.style.cssText = 'width:100%;max-height:260px;object-fit:contain;border-radius:10px;border:2px solid #C9A84C;display:block';

  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = function() {
    ctx.drawImage(img, 0, 0, w, h);

    // Estimate key positions based on typical face proportions
    const cx  = w * 0.50;  // center x
    const ey  = h * 0.42;  // eye level y
    const fW  = w * 0.72;  // face width reference
    const lW  = fW * 0.24; // single lens width estimate
    const lH  = lW * 0.62; // lens height
    const br  = fW * 0.04; // bridge width
    const pupOD = cx - (br/2) - (lW*0.5); // pupil OD x
    const pupOE = cx + (br/2) + (lW*0.5); // pupil OE x

    // Helper: draw a line with label
    function linha(x1,y1,x2,y2, cor, label, labelPos) {
      ctx.save();
      ctx.strokeStyle = cor;
      ctx.lineWidth   = Math.max(2, w*0.003);
      ctx.setLineDash([8,4]);
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      // End ticks
      ctx.setLineDash([]);
      const tickH = h*0.018;
      ctx.beginPath(); ctx.moveTo(x1,y1-tickH); ctx.lineTo(x1,y1+tickH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x2,y2-tickH); ctx.lineTo(x2,y2+tickH); ctx.stroke();
      // Label background
      if(label) {
        ctx.font = `bold ${Math.max(14,w*0.022)}px DM Sans, sans-serif`;
        const tw = ctx.measureText(label).width;
        const lx = labelPos==='left' ? Math.min(x1,x2) : (x1+x2)/2 - tw/2;
        const ly = y1 - h*0.025;
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(lx-4, ly-parseInt(ctx.font)-2, tw+8, parseInt(ctx.font)+8);
        ctx.fillStyle = cor;
        ctx.fillText(label, lx, ly);
      }
      ctx.restore();
    }

    // Helper: draw pupil dot
    function pupila(x, y, cor, label) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, Math.max(6, w*0.012), 0, Math.PI*2);
      ctx.strokeStyle = cor;
      ctx.lineWidth = Math.max(2.5, w*0.004);
      ctx.stroke();
      ctx.fillStyle = cor + '40';
      ctx.fill();
      // cross hair
      const cz = Math.max(10, w*0.018);
      ctx.beginPath(); ctx.moveTo(x-cz,y); ctx.lineTo(x+cz,y);
      ctx.moveTo(x,y-cz); ctx.lineTo(x,y+cz);
      ctx.strokeStyle = cor;
      ctx.lineWidth = Math.max(1.5, w*0.002);
      ctx.stroke();
      // label
      if(label) {
        ctx.font = `bold ${Math.max(12,w*0.018)}px DM Sans, sans-serif`;
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(x+8, y-16, tw+8, 20);
        ctx.fillStyle = cor;
        ctx.fillText(label, x+12, y-2);
      }
      ctx.restore();
    }

    // Draw lens outlines
    function lente(x, y, lw, lh, cor) {
      ctx.save();
      ctx.strokeStyle = cor;
      ctx.lineWidth = Math.max(2, w*0.003);
      ctx.setLineDash([6,3]);
      ctx.strokeRect(x - lw/2, y - lh/2, lw, lh);
      ctx.setLineDash([]);
      ctx.restore();
    }

    const dpTotal = r.dpOD && r.dpOE ? (parseInt(r.dpOD)+parseInt(r.dpOE)) : (parseInt(r.dpTotal)||62);
    const dpOD    = r.dpOD || '—';
    const dpOE    = r.dpOE || '—';
    const coOD    = r.coOD || '—';
    const coOE    = r.coOE || '—';
    const larg    = r.larguraArmacao || '—';
    const alt     = r.alturaLente    || '—';
    const ponte   = r.ponteArmacao   || '—';

    // Draw lens boxes (dashed)
    lente(pupOD, ey, lW, lH, '#C9A84C');
    lente(pupOE, ey, lW, lH, '#C9A84C');

    // DP Total line (between pupils, at eye level - h*0.08 above)
    const dpY = ey - lH*0.6;
    linha(pupOD, dpY, pupOE, dpY, '#C9A84C', 'DP '+dpTotal+'mm');

    // DP OD line (from center to OD pupil)
    linha(cx, dpY + h*0.045, pupOD, dpY + h*0.045, '#f0c040', 'OD '+dpOD+'mm');

    // DP OE line (from center to OE pupil)
    linha(cx, dpY + h*0.09, pupOE, dpY + h*0.09, '#f0c040', 'OE '+dpOE+'mm');

    // Lens width line (bottom of lens)
    const lensBot = ey + lH*0.5 + h*0.03;
    linha(pupOD - lW/2, lensBot, pupOD + lW/2, lensBot, '#10b981', 'L:'+larg+'mm');

    // Lens height line (right side of OE lens)
    const lhX = pupOE + lW/2 + w*0.03;
    linha(lhX, ey - lH/2, lhX, ey + lH/2, '#10b981', 'A:'+alt+'mm');

    // Bridge line
    linha(pupOD + lW/2, ey, pupOE - lW/2, ey, '#818cf8', 'P:'+ponte+'mm');

    // CO lines (center of lens to pupil - vertical)
    // CO OD
    const coODx = pupOD - lW/2 + (r.coOD ? parseFloat(r.coOD) * (lW/52) : lW/2);
    ctx.save();
    ctx.strokeStyle = '#818cf8';
    ctx.lineWidth = Math.max(2, w*0.003);
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(coODx, ey-lH/2); ctx.lineTo(coODx, ey+lH/2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Pupil markers
    pupila(pupOD, ey, '#ef4444', 'OD '+dpOD+'mm');
    pupila(pupOE, ey, '#ef4444', 'OE '+dpOE+'mm');

    // Center line
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(cx, h*0.1); ctx.lineTo(cx, h*0.9); ctx.stroke();
    ctx.restore();

    // Watermark
    ctx.save();
    ctx.font = `bold ${Math.max(11,w*0.016)}px DM Sans, sans-serif`;
    ctx.fillStyle = 'rgba(201,168,76,0.8)';
    ctx.fillText('Ótica lclass — Análise IA', w*0.02, h*0.97);
    ctx.restore();

    // Replace img with canvas in wrapper
    if(wrapper) {
      wrapper.innerHTML = '';
      wrapper.appendChild(canvas);
    }
  };
  img.src = imgEl.src;
}

async function analisarFotoIA(){
  const base64 = document.getElementById('rf_foto_hidden')?.value;
  if(!base64){ showToast('Nenhuma foto selecionada','error'); return; }

  const btn = document.getElementById('btn_analisar_ia');
  const res = document.getElementById('rf_ia_resultado');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Analisando...'; }
  if(res){ res.style.display='block'; res.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">🤖 Analisando a foto com IA...<br><small>Isso pode levar alguns segundos</small></div>'; }

  // Compress image before sending to reduce size and improve reliability
  const mediaType = 'image/jpeg';
  let imgData;
  try {
    // Resize/compress the image to max 800px wide
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const maxW = 800, maxH = 600;
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h*maxW/w); w = maxW; }
        if(h > maxH){ w = Math.round(w*maxH/h); h = maxH; }
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = w; tmpCanvas.height = h;
        const tmpCtx = tmpCanvas.getContext('2d');
        tmpCtx.drawImage(img, 0, 0, w, h);
        const compressed = tmpCanvas.toDataURL('image/jpeg', 0.80);
        imgData = compressed.split(',')[1];
        resolve();
      };
      img.onerror = reject;
      img.src = base64;
    });
  } catch(e) {
    imgData = base64.split(',')[1];
  }

  // Get reference measurement (Opção B)
  const refValor = document.getElementById('rf_ref_largura')?.value?.trim() || '';
  const refTipo = document.getElementById('rf_ref_tipo')?.value || 'largura_total';
  const usouGrade = document.getElementById('rf_usar_grade')?.checked || false;

  const tipoRefTexto = {
    'largura_total': 'largura total da armação (ponta a ponta)',
    'largura_lente': 'largura de uma lente',
    'ponte': 'largura da ponte entre as lentes',
    'altura_lente': 'altura de uma lente'
  }[refTipo] || refTipo;

  const refInfo = refValor
    ? 'REFERÊNCIA DE ESCALA FORNECIDA: A ' + tipoRefTexto + ' desta armação mede EXATAMENTE ' + refValor + 'mm. Use este valor como escala absoluta para calcular TODAS as outras medidas com precisão matemática proporcional.'
    : 'IMPORTANTE: Verifique se há números gravados na armação (formato comum: 52-19-147 ou 52□19-147 onde primeiro=largura da lente, segundo=ponte, terceiro=haste). Se encontrar, USE esses números como escala de referência. Se houver uma régua pupilar visível na foto, use-a como escala. Caso contrário, estime com base em proporções típicas (largura total entre 125-145mm).';

  const gradeInfo = usouGrade
    ? 'O cliente foi posicionado com os olhos alinhados à grade de referência antes da foto, o que melhora a precisão das medidas pupilares.'
    : '';

  const prompt = [
    'Você é um especialista óptico experiente em medidas pupilares e armações. Analise CUIDADOSAMENTE esta foto.',
    '',
    '=== SITUAÇÃO DA FOTO ===',
    refInfo,
    gradeInfo ? gradeInfo : '',
    '',
    '=== PASSO 1: IDENTIFICAR ESCALA ===',
    'Primeiro, procure na imagem:',
    'a) Números gravados na armação (ex: 52-19-147 ou 52□19-147) — leia diretamente',
    'b) Régua pupilar visível — use como escala milimétrica',
    'c) Medida fornecida acima — use como referência absoluta',
    'd) Se nada acima, estime pela proporção típica de armações (largura total ~130-140mm)',
    '',
    '=== PASSO 2: CALCULAR MEDIDAS ===',
    'Com a escala identificada, calcule:',
    '1. numerosArmacao: números gravados na armação se visíveis (ex: "52-19-147") ou null',
    '2. dpOD: distância horizontal da ponte ATÉ a pupila direita (mm)',
    '3. dpOE: distância horizontal da ponte ATÉ a pupila esquerda (mm)',
    '4. dpTotal: dpOD + dpOE',
    '5. coOD: distância vertical da pupila direita ATÉ a borda INFERIOR da lente (mm)',
    '6. coOE: distância vertical da pupila esquerda ATÉ a borda INFERIOR da lente (mm)',
    '7. larguraArmacao: largura de UMA lente (mm)',
    '8. alturaLente: altura de UMA lente (mm)',
    '9. ponteArmacao: distância entre as duas lentes (mm)',
    '10. compatibilidade: "Sim", "Parcial" ou "Nao"',
    '11. escalaUsada: explique qual escala usou para calibrar',
    '12. observacoes: observações técnicas importantes',
    '',
    'Responda APENAS em JSON válido:',
    '{',
    '  "numerosArmacao": "52-19-147",',
    '  "dpOD": "32",',
    '  "dpOE": "30",',
    '  "dpTotal": "62",',
    '  "coOD": "20",',
    '  "coOE": "20",',
    '  "larguraArmacao": "52",',
    '  "alturaLente": "36",',
    '  "ponteArmacao": "19",',
    '  "compatibilidade": "Sim",',
    '  "escalaUsada": "Números gravados na armação: 52-19-147",',
    '  "observacoes": "Medidas precisas baseadas nos números da armação."',
    '}',
    '',
    'IMPORTANTE: Responda SOMENTE o JSON acima. Zero texto antes ou depois. Sem explicações.'
  ].join('\n')

  try {
    const API_KEY = localStorage.getItem('otica_api_key') || '';
    if(!API_KEY){
      if(res){ res.style.display='block'; res.innerHTML='<div style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:14px;font-size:13px"><strong style="color:#C9A84C">🔑 Configure sua chave API</strong><br><br>Vá em <strong>Configurações</strong> no menu lateral para adicionar sua chave API da Anthropic.</div>'; }
      if(btn){ btn.disabled=false; btn.textContent='🤖 Analisar com IA'; }
      return;
    }
    const reqBody = JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: imgData } },
          { type: 'text', text: prompt }
        ]
      }]
    });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: reqBody
    });

    if(!response.ok){
      const errData = await response.json().catch(()=>({}));
      throw new Error('API erro '+response.status+': '+(errData?.error?.message||response.statusText));
    }
    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    console.log('IA resposta:', text);

    let resultado;
    try {
      let clean = text.trim();
      clean = clean.replace(/```json/gi,'').replace(/```/g,'').trim();
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if(jsonMatch) clean = jsonMatch[0];
      resultado = JSON.parse(clean);
    } catch(e) {
      console.log('Raw IA response:', text);
      // If text is empty or very short, API might have issues
      if(!text || text.length < 10) {
        throw new Error('IA nao retornou dados. Verifique se a chave API esta ativa.');
      }
      // Try to extract values using simple string search
      function extrairNum(txt, palavras) {
        for(var pw of palavras) {
          var idx = txt.toLowerCase().indexOf(pw.toLowerCase());
          if(idx >= 0) {
            var trecho = txt.substring(idx, idx+20);
            var nums = trecho.match(/[\d.]+/);
            if(nums) return nums[0];
          }
        }
        return null;
      }
      resultado = {
        dpTotal: extrairNum(text, ['dp total','dptotal','dp:','distancia pupilar']),
        dpOD: extrairNum(text, ['dp od','dpod','dp direito','dp olho direito']),
        dpOE: extrairNum(text, ['dp oe','dpoe','dp esquerdo','dp olho esquerdo']),
        coOD: extrairNum(text, ['co od','cood','co direito']),
        coOE: extrairNum(text, ['co oe','cooe','co esquerdo']),
        larguraArmacao: extrairNum(text, ['largura','larg.']),
        alturaLente: extrairNum(text, ['altura','alt.']),
        ponteArmacao: extrairNum(text, ['ponte']),
        compatibilidade: text.toLowerCase().indexOf('sim') >= 0 ? 'Sim' : text.toLowerCase().indexOf('parcial') >= 0 ? 'Parcial' : 'Verificar',
        observacoes: text.replace(/[{}"\[\]]/g,'').substring(0, 200),
      };
      if(!resultado.dpOD && !resultado.dpTotal) {
        throw new Error('Nao foi possivel ler os dados. Resposta: ' + text.substring(0,80));
      }
    }

    // Fill in the fields automatically
    if(resultado.dpOD) document.getElementById('rf_dpL').value = resultado.dpOD;
    if(resultado.dpOE) {
      const dpP = resultado.dpOE ? String(Math.max(0,parseInt(resultado.dpOE)-1)) : '';
      document.getElementById('rf_dpP').value = dpP;
    }
    if(resultado.coOD) document.getElementById('rf_coD').value = resultado.coOD;
    if(resultado.coOE) document.getElementById('rf_coE').value = resultado.coOE;

    // Draw measurements overlay on the photo
    const imgEl = document.querySelector('#rf_foto_preview img');
    if(imgEl && resultado) {
      desenharMedidas(imgEl, resultado);
    }

    const compatColor = resultado.compatibilidade==='Sim' ? '#10b981' : resultado.compatibilidade==='Parcial' ? '#C9A84C' : '#ef4444';
    const compatIcon  = resultado.compatibilidade==='Sim' ? '✅' : resultado.compatibilidade==='Parcial' ? '⚠️' : '❌';
    const dpTotal = resultado.dpTotal || ((resultado.dpOD && resultado.dpOE) ? String(parseInt(resultado.dpOD)+parseInt(resultado.dpOE)) : '—');
    // Auto-fill DP fields from dpOD/dpOE
    if(resultado.dpOD) document.getElementById('rf_dpD').value = resultado.dpOD;
    if(resultado.dpOE) document.getElementById('rf_dpE').value = resultado.dpOE;

    res.style.display = 'block';
    // Show frame numbers if found
    const frameNumBadge = resultado.numerosArmacao
      ? '<div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px"><span style="color:#10b981;font-weight:700">✅ Números da armação lidos:</span> <strong style="color:#e2e8f0">'+resultado.numerosArmacao+'</strong></div>'
      : '';
    const escalaInfo = resultado.escalaUsada
      ? '<div style="font-size:11px;color:var(--dim);margin-bottom:8px">📐 Escala usada: '+resultado.escalaUsada+'</div>'
      : '';
    res.innerHTML = `
      <div style="background:#080e1a;border:1px solid #C9A84C;border-radius:12px;padding:16px">
        <div style="font-size:12px;color:#C9A84C;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">🤖 Resultado da Análise IA</div>
        ${frameNumBadge}
        ${escalaInfo}
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
          ${[
            ['DP Total', dpTotal+'mm','#C9A84C'],
            ['DP OD',   (resultado.dpOD||'—')+'mm','#C9A84C'],
            ['DP OE',   (resultado.dpOE||'—')+'mm','#C9A84C'],
            ['CO OD',   (resultado.coOD||'—')+'mm','#818cf8'],
            ['CO OE',   (resultado.coOE||'—')+'mm','#818cf8'],
            ['Largura', (resultado.larguraArmacao||'—')+'mm','#10b981'],
            ['Altura',  (resultado.alturaLente||'—')+'mm','#10b981'],
            ['Ponte',   (resultado.ponteArmacao||'—')+'mm','#10b981'],
          ].map(([l,v,c])=>`<div style="background:var(--surface);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:10px;color:var(--dim)">${l}</div>
            <div style="font-size:15px;font-weight:800;color:${c}">${v}</div>
          </div>`).join('')}
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:10px;background:${compatColor}15;border:1px solid ${compatColor}40;border-radius:8px;margin-bottom:8px">
          <span style="font-size:18px">${compatIcon}</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:${compatColor}">Compatibilidade: ${resultado.compatibilidade||'—'}</div>
            <div style="font-size:11px;color:var(--muted)">${resultado.observacoes||''}</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--dim);font-style:italic">* Estimativas da IA — confirme com pupilômetro</div>
      </div>`;

    showToast('Análise concluída! Medidas marcadas na foto.', 'success');

  } catch(err) {
    const errMsg = err.message || 'Erro desconhecido';
    console.error('Erro IA:', err);
    if(res) {
      res.style.display = 'block';
      let dica = 'Tente novamente ou preencha os campos manualmente.';
      if(errMsg.includes('fetch') || errMsg.includes('network') || errMsg.toLowerCase().includes('failed')) {
        dica = '📡 Verifique a conexão com internet. Se estiver conectado, a chave API pode precisar ser renovada.';
      }
      res.innerHTML = '<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:14px;color:#ef4444;font-size:13px">❌ Erro na análise: '+errMsg+'.<br><small style="color:var(--muted)">'+dica+'</small></div>';
    }
    showToast('Erro na análise', 'error');
  } finally {
    if(btn){ btn.disabled=false; btn.textContent='🤖 Analisar com IA'; }
  }
}

function salvarReceita(id){
  const g=x=>document.getElementById(x)?.value?.trim()||'';
  const cliId=parseInt(g('rf_cli'));
  const prof=g('rf_prof'),val=g('rf_val');
  if(!cliId||!prof||!val)return showToast('Preencha os campos obrigatórios','error');
  const keys=['Esfera','Cilindro','Eixo','Adicao','Dnp'];
  // Foto NAO salva no banco - apenas usada para analise IA temporariamente
  const dpD=g('rf_dpD'),dpE=g('rf_dpE');
  const dpAuto=(parseFloat(dpD)||0)+(parseFloat(dpE)||0);
  const dpL=g('rf_dpL')||(dpAuto>0?dpAuto.toFixed(1):'');
  const coD=g('rf_coD'),coE=g('rf_coE');
  const data={
    clienteId:cliId,profissional:prof,validade:val,obs:g('rf_obs'),
    ativa:document.getElementById('rf_ativa')?.checked||false,
    dpLonge:dpL,dpPerto:g('rf_dpP'),
    coDir:coD,coEsq:coE,
    dpDir:g('rf_dpD'),dpEsq:g('rf_dpE'),
    altDir:g('rf_altD'),altEsq:g('rf_altE'),
    tipoLente:document.getElementById('rf_tipo_lente')?.value||'',
  };
  ['od','oe'].forEach(p=>keys.forEach(k=>{data[p+k]=g('rf_'+p+k);}));
  if(id){
    state.receitas=state.receitas.map(r=>r.id===id?{...r,...data}:r);
    showToast('Receita atualizada!','success');
  } else {
    state.receitas.push({...data,id:uid(),data:today()});
    showToast('Receita cadastrada!','success');
  }
  saveAll();closeModal();renderReceituario();
}
function deletarReceita(id){
  confirmDialog('Tem certeza que deseja excluir esta receita?',()=>{
    state.receitas=state.receitas.filter(r=>r.id!==id);
    saveAll();showToast('Receita removida.','info');renderReceituario();
  });
}

          ${r.dpPerto?'<div style="text-align:center;padding:8px 14px;background:var(--surface);border-radius:8px"><div style="font-size:9px;color:var(--dim)">DP PERTO TOTAL</div><div style="font-size:18px;font-weight:800;color:#C9A84C">'+r.dpPerto+'mm</div></div>':''}

        <button class="btn btn-primary" onclick="salvarCrediario()">Registrar Crediário</button>

function calcParcela(){
  const t=parseFloat(document.getElementById('crd_total')?.value||0);
  const n=parseInt(document.getElementById('crd_parc')?.value||1);
  const j=parseFloat(document.getElementById('crd_juros')?.value||0);
  const vp=t*(1+j/100)/n;
  const el=document.getElementById('crd_vp');
  if(el)el.textContent=fmt(isNaN(vp)?0:vp);
}
function salvarCrediario(){
  const cliId=parseInt(document.getElementById('crd_cli')?.value||0);
  const total=parseFloat(document.getElementById('crd_total')?.value||0);
  const n=parseInt(document.getElementById('crd_parc')?.value||1);
  const dp=document.getElementById('crd_data')?.value||today();
  const j=parseFloat(document.getElementById('crd_juros')?.value||0);
  const desc=document.getElementById('crd_desc')?.value?.trim()||'';
  if(!cliId||!total||!dp)return showToast('Preencha os campos obrigatórios','error');
  const vp=+(total*(1+j/100)/n).toFixed(2);
  const pagamentos=Array.from({length:n},(_,i)=>{
    const d=new Date(dp+'T12:00:00');d.setMonth(d.getMonth()+i);
    return{num:i+1,venc:d.toISOString().split('T')[0],valor:vp,pago:false,dataPag:'',forma:'',obs:''};
  });
  state.crediario.push({id:uid(),clienteId:cliId,data:today(),total,parcelas:n,dataPrimeira:dp,juros:j,descricao:desc,pagamentos});
  saveAll();closeModal();showToast('Crediário registrado!','success');renderCrediario();
}
function abrirPagModal(credId,parcNum,valor){
  showModal(`
    <div class="modal-header"><h2>Registrar Pagamento</h2><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="color:var(--muted);margin-bottom:16px">Parcela <strong>${parcNum}</strong> — <strong style="color:#C9A84C">${fmt(valor)}</strong></p>
      <p style="font-size:13px;color:var(--dim);margin-bottom:12px">Selecione a forma de pagamento:</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="marcarPago(${credId},${parcNum},'Pix')">💸 Pix</button>
    <button class="btn btn-secondary" onclick="marcarPago(${credId},${parcNum},'Dinheiro')">💵 Dinheiro</button>
    <button class="btn btn-secondary" onclick="marcarPago(${credId},${parcNum},'Cartao')">💳 Cartão</button>
      </div>
      <div style="margin-top:16px"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>
    </div>
  `,'modal-sm');
}
function marcarPago(credId,parcNum,forma){
  const formaFinal = forma === 'Cartao' ? 'Cartão' : forma;
  state.crediario=state.crediario.map(c=>c.id===credId?{
    ...c,pagamentos:c.pagamentos.map(p=>p.num===parcNum?{...p,pago:true,dataPag:today(),forma:formaFinal}:p)
  }:c);
  saveAll();closeModal();showToast('Parcela marcada como paga!','success');renderCrediario();
  // oferecer envio WA
  const cred=state.crediario.find(c=>c.id===credId);
  const parc=cred?.pagamentos.find(p=>p.num===parcNum);
  const tel=clienteTel(cred?.clienteId);
  if(tel){
    setTimeout(()=>{
      if(confirm('Deseja enviar o comprovante pelo WhatsApp?')){
        const msg=gerarMsgParcela(cred,parc);
        modalWhatsApp(`Comprovante parcela ${parcNum} — ${clienteNome(cred.clienteId)}`,msg,tel);
      }
    },400);
  }
}
function enviarWhatsAppParcela(credId,parcNum){
  const cred=state.crediario.find(c=>c.id===credId);if(!cred)return;
  const parc=cred.pagamentos.find(p=>p.num===parcNum);if(!parc)return;
  const msg=gerarMsgParcela(cred,parc);
  const tel=clienteTel(cred.clienteId);
  modalWhatsApp(`Comprovante parcela ${parcNum} — ${clienteNome(cred.clienteId)}`,msg,tel);
}

function enviarLembrete(credId, parcNum){
  const cred = state.crediario.find(c=>c.id===credId); if(!cred)return;

function enviarCobranca(credId, parcNum){

function calcTotal(){

function deletarVenda(id){

function enviarWhatsAppVenda(id){
  const v=state.vendas.find(x=>x.id===id);if(!v)return;
  const msg=gerarMsgVenda(v);
  const tel=clienteTel(v.clienteId);
  modalWhatsApp('Comprovante de venda — '+clienteNome(v.clienteId),msg,tel);
}

  const status = document.createElement('div');
  status.style.cssText = 'padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px;'+(temChave ? 'background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981' : 'background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444');
  status.textContent = temChave ? '✅ Chave configurada — IA ativa' : '❌ Chave não configurada — IA desativada';

  const instrucoes = document.createElement('div');
  instrucoes.style.cssText = 'font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.6';
  instrucoes.innerHTML = '1. Acesse <strong style="color:#C9A84C">platform.claude.com/settings/keys</strong><br>2. Crie uma nova chave<br>3. Cole abaixo e salve';

  const input = document.createElement('input');
  input.className = 'inp';
  input.type = 'password';
  input.placeholder = 'sk-ant-api03-...';
  input.value = keyAtual;
  input.style.marginBottom = '12px';

  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  
  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn btn-danger';
  clearBtn.textContent = 'Remover chave';
  clearBtn.addEventListener('click', ()=>{
    localStorage.removeItem('otica_api_key');
    showToast('Chave removida!', 'info');
    closeModal();
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = '💾 Salvar Chave';
  saveBtn.addEventListener('click', ()=>{
    const k = input.value.trim();
    if(!k.startsWith('sk-ant-')){ showToast('Chave inválida! Deve começar com sk-ant-','error'); return; }
    localStorage.setItem('otica_api_key', k);
    showToast('Chave salva! IA ativada ✅', 'success');
    closeModal();
  });

  footer.appendChild(clearBtn);
  footer.appendChild(saveBtn);
  body.appendChild(secTitle);
  body.appendChild(status);
  body.appendChild(instrucoes);
  body.appendChild(input);
  body.appendChild(footer);
  box.appendChild(header);
  box.appendChild(body);
  overlay.appendChild(box);
  root.appendChild(overlay);
}

renderNav();
renderDashboard();
